services:
  - type: web
    name: sahityika-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: sahityika-db
          property: connectionString

databases:
  - name: sahityika-db
    plan: free